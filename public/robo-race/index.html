<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A5X Robotics Future Vision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@500;600;700;800&family=Orbitron:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="A5X Robotics product landing page">
      <section class="hero" data-parallax-scene>
        <nav class="nav" aria-label="Primary navigation">
          <a class="brand" href="#">
            <span class="brand-mark"></span>
            <span class="brand-main">A5X</span>
            <span class="brand-sub">Robotics</span>
          </a>
          <div class="nav-links">
            <a class="active" href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Kits</a>
            <a href="#">Learn</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
          </div>
          <div class="nav-actions">
            <a class="nav-cta ghost" href="#">Wishlist</a>
            <a class="nav-cta" href="#">Cart</a>
          </div>
        </nav>

        <div class="hero-copy" aria-hidden="true">
          <span class="future">FUTURE</span>
          <span class="vision">VISION</span>
        </div>

        <section class="shop-panel" aria-label="A5X Robotics shopping actions">
          <p>Premium robotics kits, components, and courses for builders who want to create something real.</p>
          <div class="shop-actions">
            <a class="shop-primary" href="#">Shop Now</a>
            <a class="shop-secondary" href="#">Explore Kits</a>
          </div>
        </section>

        <figure class="model-wrap">
          <img src="./assets/robot-model.png" alt="Futuristic black robotic model with glowing blue lenses" />
        </figure>

        <aside class="callout callout-left" aria-label="Robotics kit note">
          <div class="thumb">
            <img src="./assets/robot-model.png" alt="" />
          </div>
          <p>PREMIUM<br />ROBOTICS<br />KITS</p>
        </aside>

        <aside class="callout callout-right" aria-label="Future vision note">
          <p>NEXT GEN<br />FUTURE<br />VISION</p>
          <div class="thumb">
            <img src="./assets/robot-model.png" alt="" />
          </div>
        </aside>

        <aside class="rating-badge" aria-label="Rated number one robotics store in India">
          <span>Rated #1 Robotics Store in India</span>
        </aside>

        <span class="node node-left" aria-hidden="true"></span>
        <span class="node node-right" aria-hidden="true"></span>
        <div class="line line-left" aria-hidden="true"></div>
        <div class="line line-right" aria-hidden="true"></div>

        <a class="buy" href="#">Shop Now</a>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
